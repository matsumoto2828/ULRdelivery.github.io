<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="google-site-verification" content="WiN3XKJ9M1AVHyZslY6A163XbGrWgzu495IPj-KZunU" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>URLの宅配便 — 空から落ちてくるリンク</title>
<meta name="description" content="ボタンを押すとURLの書かれた荷物が空から降ってくる、ただそれだけの奇妙なサイト。ドラッグして放り投げたり、クリックして開封できます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#3E5B78;
    --sky-mid:#7F99A8;
    --sky-low:#C9CBB4;
    --floor:#5B5448;
    --floor-line:#46403660;
    --kraft:#CDA068;
    --kraft-dark:#9C7541;
    --kraft-edge:#7E5C32;
    --tape:#EFE2BF;
    --ink:#2B241C;
    --stamp:#AE3B2E;
    --paper:#F4EEDD;
    --header-h:128px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- header ---------- */
  header{
    position:relative;
    z-index:5;
    height:var(--header-h);
    padding:14px 20px 10px;
    background:linear-gradient(180deg,#2F4658,#3E5B78);
    border-bottom:3px solid var(--kraft-edge);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:14px 22px;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-right:auto;
    min-width:200px;
  }
  .brand .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:.18em;
    color:#E7DEC2;
    opacity:.8;
  }
  h1{
    margin:0;
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:clamp(20px,3.4vw,28px);
    color:#F4EEDD;
    letter-spacing:.03em;
    text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .sub{
    font-size:11.5px;
    color:#CBD4D6;
    line-height:1.5;
  }

  .controls{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .urlform{
    display:flex;
    align-items:stretch;
    border:2px solid var(--kraft-edge);
    background:var(--paper);
    border-radius:3px;
    overflow:hidden;
  }
  .urlform input{
    border:none;
    background:transparent;
    padding:9px 10px;
    font-family:'Space Mono', monospace;
    font-size:12.5px;
    width:min(46vw,230px);
    color:var(--ink);
    outline:none;
  }
  .urlform input::placeholder{ color:#8a7f6a; }

  button{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
    border:2px solid var(--kraft-edge);
    border-radius:3px;
    padding:9px 14px;
    background:var(--kraft);
    color:var(--ink);
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
    white-space:nowrap;
  }
  button:hover{ background:#DCB07E; }
  button:active{ transform:translateY(2px); }
  button:focus-visible, input:focus-visible, .box:focus-visible{
    outline:3px solid #FFD56A;
    outline-offset:2px;
  }
  #dropBtn{ background:var(--stamp); color:var(--paper); border-color:#7A2820; }
  #dropBtn:hover{ background:#C7493B; }
  #clearBtn{ background:transparent; color:#E7DEC2; border-color:#7C8C97; }
  #clearBtn:hover{ background:rgba(255,255,255,.08); }
  .urlform button{ border:none; border-left:2px solid var(--kraft-edge); border-radius:0; }

  .shake{ animation:shake .35s ease; }
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-7px);}
    40%,60%{transform:translateX(7px);}
  }

  /* ---------- playfield ---------- */
  #playfield{
    position:absolute;
    top:var(--header-h);
    left:0; right:0; bottom:0;
    overflow:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-low) 86%);
  }
  #floor{
    position:absolute;
    left:0; right:0; bottom:0; height:64px;
    background:
      repeating-linear-gradient(90deg, var(--floor-line) 0 2px, transparent 2px 96px),
      linear-gradient(180deg,#6b6457,var(--floor));
    border-top:3px solid #312c24;
    box-shadow: inset 0 10px 16px -10px rgba(0,0,0,.5);
  }
  .tally{
    position:absolute;
    left:14px; bottom:10px;
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:#E6E0CE;
    letter-spacing:.04em;
    opacity:.85;
    user-select:none;
  }
  .sign{
    position:absolute;
    right:14px; bottom:8px;
    font-family:'Shippori Mincho B1', serif;
    font-size:12px;
    color:#E6E0CE;
    opacity:.6;
    user-select:none;
  }

  .cloud{
    position:absolute;
    opacity:.55;
    filter:blur(.3px);
    pointer-events:none;
    will-change:transform;
  }
  .bird{
    position:absolute;
    pointer-events:none;
    opacity:.7;
    animation:birdflap 1.1s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes birdflap{ 50%{ transform:scaleY(.6); } }

  .empty-hint{
    position:absolute;
    left:50%; top:42%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#1f2f3c;
    opacity:.55;
    font-family:'Shippori Mincho B1', serif;
    font-size:clamp(14px,2.2vw,18px);
    pointer-events:none;
    transition:opacity .4s ease;
    line-height:1.9;
  }

  /* ---------- box (parcel) ---------- */
  .box{
    position:absolute;
    touch-action:none;
    cursor:grab;
    user-select:none;
    will-change:transform;
  }
  .box:active{ cursor:grabbing; }
  .box .face{
    position:relative;
    width:100%; height:100%;
    background:
      linear-gradient(135deg, rgba(255,255,255,.10), transparent 40%),
      linear-gradient(180deg, var(--kraft), var(--kraft-dark));
    border:2px solid var(--kraft-edge);
    border-radius:4px;
    box-shadow:0 10px 16px -6px rgba(20,15,5,.45), inset 0 0 0 1px rgba(255,255,255,.05);
    padding:10px 11px 9px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
  }
  .box .tape{
    position:absolute;
    top:-10px; left:14%;
    width:46%; height:22px;
    background:linear-gradient(180deg,var(--tape),#e0d2a4cc);
    opacity:.85;
    transform:rotate(-7deg);
    box-shadow:0 1px 2px rgba(0,0,0,.2);
  }
  .box .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:8.5px;
    letter-spacing:.14em;
    color:#3c2c14;
    opacity:.65;
  }
  .box .domain{
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:15px;
    line-height:1.15;
    color:var(--ink);
    word-break:break-all;
  }
  .box .path{
    font-family:'Space Mono', monospace;
    font-size:9px;
    color:#3c2c14;
    opacity:.75;
    line-height:1.3;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .box .barcode{
    height:13px;
    background:repeating-linear-gradient(90deg,#2b241c 0 2px, transparent 2px 4px, #2b241c 4px 5px, transparent 5px 9px);
    opacity:.55;
    margin-top:5px;
  }
  .box .stamp{
    position:absolute;
    right:6px; bottom:6px;
    width:46px; height:46px;
    border:2.5px solid var(--stamp);
    border-radius:50%;
    color:var(--stamp);
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:10px;
    line-height:1.15;
    transform:rotate(-18deg);
    opacity:.8;
    mix-blend-mode:multiply;
  }
  .box.opened .face{ animation:pop .3s ease; }
  @keyframes pop{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.12); filter:brightness(1.2); }
    100%{ transform:scale(1); }
  }

  .sr-only{
    position:absolute; width:1px; height:1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
  }

  @media (prefers-reduced-motion: reduce){
    .bird{ animation:none; }
  }

  @media (max-width:640px){
    :root{ --header-h:158px; }
    header{ align-items:flex-start; }
    .urlform input{ width:50vw; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="eyebrow">ODD DELIVERY CO. — 取扱注意</span>
    <h1>URLの宅配便</h1>
    <span class="sub">押すたびに同じ荷物が降ってきます。つかんで放り投げたり、クリックで開封できます。</span>
  </div>
  <div class="controls">
    <button id="dropBtn" type="button">荷物をひとつ落とす</button>
    <button id="clearBtn" type="button">床を片付ける</button>
  </div>
</header>

<main id="playfield" aria-label="荷物が降ってくる場所。マウスでつかんで投げられます。">
  <div class="empty-hint" id="emptyHint">まだ何も落ちてきていません。<br>上のボタンを押してみてください。</div>
  <div id="floor">
    <div class="tally" id="tally">本日の取扱個数：0 個</div>
    <div class="sign">仕分け場 No.7</div>
  </div>
</main>

<script>
(() => {
  "use strict";

  const playfield = document.getElementById('playfield');
  const floor = document.getElementById('floor');
  const tally = document.getElementById('tally');
  const emptyHint = document.getElementById('emptyHint');
  const dropBtn = document.getElementById('dropBtn');
  const clearBtn = document.getElementById('clearBtn');

  // ここを書き換えれば、降ってくるURLを変更できます
  const FIXED_URL = "https://satie-sci.notion.site/38f1d25ebe6a80d98da8daea05800b49";

  const STAMPS = ["速達", "取扱注意", "天地無用", "ワレモノ", "至急"];

  let count = 0;
  let floorH = floor.getBoundingClientRect().height || 64;
  let W = playfield.clientWidth;
  let H = playfield.clientHeight;

  function resize(){
    W = playfield.clientWidth;
    H = playfield.clientHeight;
    floorH = floor.getBoundingClientRect().height || 64;
    for(const b of boxes){
      b.x = Math.min(b.x, W - b.w);
      const groundY = H - floorH - b.h;
      if(b.y > groundY) b.y = groundY;
    }
  }
  window.addEventListener('resize', resize);

  // ---------------- background atmosphere ----------------
  function makeCloud(x,y,scale,dur){
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS,"svg");
    svg.setAttribute("viewBox","0 0 120 50");
    svg.setAttribute("width", 120*scale);
    svg.setAttribute("height", 50*scale);
    svg.classList.add("cloud");
    svg.style.left = x+"px";
    svg.style.top = y+"px";
    svg.innerHTML = `<ellipse cx="30" cy="32" rx="28" ry="16" fill="#fff"/>
      <ellipse cx="58" cy="22" rx="32" ry="20" fill="#fff"/>
      <ellipse cx="90" cy="30" rx="24" ry="14" fill="#fff"/>`;
    playfield.appendChild(svg);
    svg.animate(
      [{ transform:"translateX(0)" }, { transform:`translateX(${dur>0?40:-40}px)` }],
      { duration: 9000, iterations: Infinity, direction:"alternate", easing:"ease-in-out" }
    );
  }
  makeCloud(40,28,1,1);
  makeCloud(W*0.6,55,1.3,-1);

  function makeBird(x,y){
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS,"svg");
    svg.setAttribute("viewBox","0 0 20 10");
    svg.setAttribute("width","20"); svg.setAttribute("height","10");
    svg.classList.add("bird");
    svg.style.left = x+"px"; svg.style.top = y+"px";
    svg.innerHTML = `<path d="M0 5 Q5 0 10 5 Q15 0 20 5" stroke="#1f2f3c" stroke-width="1.6" fill="none" stroke-linecap="round"/>`;
    playfield.appendChild(svg);
  }
  makeBird(W*0.25, 70);

  // ---------------- physics ----------------
  const boxes = [];
  const GRAVITY = 2000;
  const REST = 0.42;
  const FRICTION = 0.90;
  const MAX_SPEED = 2400;

  function safeUrl(raw){
    let s = raw.trim();
    if(!s) return null;
    if(!/^https?:\/\//i.test(s)) s = "https://" + s;
    try{
      const u = new URL(s);
      if(!u.hostname.includes(".")) return null;
      return u.toString();
    }catch(e){ return null; }
  }

  function createBox(url){
    let host, path;
    try{
      const u = new URL(url);
      host = u.hostname.replace(/^www\./,'');
      path = (u.pathname + u.search).slice(0,40);
      if(path === "/") path = "";
    }catch(e){ host = url.slice(0,24); path = ""; }

    const w = 138 + Math.round(Math.random()*26);
    const h = 96 + Math.round(Math.random()*16);

    const el = document.createElement('div');
    el.className = 'box';
    el.tabIndex = 0;
    el.setAttribute('role','link');
    el.setAttribute('aria-label', `URL荷物: ${host}。クリックで開封してリンクを開きます。ドラッグして投げられます。`);
    el.style.width = w+'px';
    el.style.height = h+'px';

    const stampText = Math.random() < 0.45 ? STAMPS[Math.floor(Math.random()*STAMPS.length)] : null;

    el.innerHTML = `
      <div class="face">
        <div class="tape"></div>
        <div class="eyebrow">DELIVERY / 配送伝票</div>
        <div class="domain">${host}</div>
        <div class="path">${path || '&nbsp;'}</div>
        <div class="barcode"></div>
        ${stampText ? `<div class="stamp">${stampText}</div>` : ``}
      </div>`;
    playfield.appendChild(el);

    const box = {
      el, url, w, h,
      x: Math.random()*(W-w),
      y: -h - Math.random()*200,
      vx: (Math.random()-0.5)*120,
      vy: 0,
      angle: (Math.random()-0.5)*10,
      av: (Math.random()-0.5)*40,
      grounded:false,
      dragging:false,
      moved:0,
      history:[],
    };
    bindInteraction(box);
    boxes.push(box);
    count++;
    tally.textContent = `本日の取扱個数：${count} 個`;
    emptyHint.style.opacity = '0';
    return box;
  }

  function bindInteraction(box){
    const el = box.el;
    let offX=0, offY=0;

    el.addEventListener('pointerdown', (e) => {
      el.setPointerCapture(e.pointerId);
      box.dragging = true;
      box.moved = 0;
      box.vx = 0; box.vy = 0; box.av = 0;
      offX = e.clientX - box.x;
      offY = e.clientY - box.y;
      box.history = [{x:e.clientX, y:e.clientY, t:performance.now()}];
      el.style.cursor = 'grabbing';
    });

    el.addEventListener('pointermove', (e) => {
      if(!box.dragging) return;
      const nx = e.clientX - offX;
      const ny = e.clientY - offY;
      box.moved += Math.abs(nx-box.x) + Math.abs(ny-box.y);
      box.x = Math.max(0, Math.min(W-box.w, nx));
      box.y = Math.max(-300, Math.min(H-floorH-box.h, ny));
      box.history.push({x:e.clientX, y:e.clientY, t:performance.now()});
      if(box.history.length > 6) box.history.shift();
    });

    function release(e){
      if(!box.dragging) return;
      box.dragging = false;
      el.style.cursor = 'grab';
      if(box.moved < 6){
        openBox(box);
        return;
      }
      const hist = box.history;
      if(hist.length >= 2){
        const a = hist[0], b = hist[hist.length-1];
        const dt = Math.max(16, b.t - a.t);
        box.vx = clamp((b.x-a.x)/dt*1000, -MAX_SPEED, MAX_SPEED);
        box.vy = clamp((b.y-a.y)/dt*1000, -MAX_SPEED, MAX_SPEED);
        box.av = clamp(box.vx*0.06, -540, 540);
      }
      box.grounded = false;
    }
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);

    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        openBox(box);
      }
    });
  }

  function openBox(box){
    box.el.classList.remove('opened');
    void box.el.offsetWidth;
    box.el.classList.add('opened');
    window.open(box.url, '_blank', 'noopener,noreferrer');
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function clearAll(){
    for(const b of boxes) b.el.remove();
    boxes.length = 0;
    emptyHint.style.opacity = '1';
  }

  // ---------------- simulation loop ----------------
  let last = performance.now();
  function tick(now){
    let dt = (now - last) / 1000;
    dt = Math.min(dt, 0.032);
    last = now;

    for(const b of boxes){
      if(b.dragging){
        b.angle = clamp(b.angle + ((b.x - (b.lastX ?? b.x)) * 0.6), -25, 25);
        b.lastX = b.x;
      } else {
        b.vy += GRAVITY*dt;
        b.x += b.vx*dt;
        b.y += b.vy*dt;
        b.angle += b.av*dt;

        const groundY = H - floorH - b.h;
        if(b.y >= groundY){
          b.y = groundY;
          if(Math.abs(b.vy) > 60){
            b.vy = -b.vy*REST;
          } else {
            b.vy = 0;
            b.grounded = true;
          }
          b.vx *= FRICTION;
          b.av *= 0.6;
        }
        if(b.x <= 0){ b.x = 0; b.vx = Math.abs(b.vx)*REST; b.av = Math.abs(b.av); }
        if(b.x >= W-b.w){ b.x = W-b.w; b.vx = -Math.abs(b.vx)*REST; b.av = -Math.abs(b.av); }

        if(b.grounded){
          b.vx *= 0.93;
          b.av *= 0.85;
          if(Math.abs(b.angle) > 0.2) b.angle *= 0.9;
          if(Math.abs(b.vx) < 1) b.vx = 0;
        }
      }
      b.el.style.transform = `translate(${b.x}px, ${b.y}px) rotate(${b.angle}deg)`;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ---------------- controls ----------------
  dropBtn.addEventListener('click', () => {
    createBox(FIXED_URL);
  });

  clearBtn.addEventListener('click', clearAll);

  // 最初から少し荷物を降らせておく
  setTimeout(() => createBox(FIXED_URL), 300);
  setTimeout(() => createBox(FIXED_URL), 900);
})();
</script>
</body>
</html>
